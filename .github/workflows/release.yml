name: Release

# On version tag push: generate changelog → publish npm → GitHub Release → commit CHANGELOG.md
#
# Setup (one-time):
#   GitHub → Settings → Secrets → Actions → NPM_TOKEN
#   (npm granular/automation token with publish access to package "darin")
#
# Ship:
#   1. Bump packages/cli/package.json version
#   2. git commit -m "chore: release v0.1.1" && git push
#   3. git tag v0.1.1 && git push origin v0.1.1

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package version
        id: meta
        run: |
          PKG_VERSION=$(jq -r .version packages/cli/package.json)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag v${TAG_VERSION} does not match packages/cli/package.json ($PKG_VERSION)"
            exit 1
          fi
          echo "version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing darin@${PKG_VERSION}"

      - name: Generate changelog
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          TAG: ${{ github.ref_name }}
        run: node .github/scripts/generate-changelog.mjs

      - name: Test CLI before publish
        working-directory: packages/cli
        run: |
          node scripts/prepack.mjs
          node bin/darin.mjs --version
          mkdir -p /tmp/darin-release-test/.cursor
          node bin/darin.mjs install -y --target /tmp/darin-release-test --providers=cursor
          test -f /tmp/darin-release-test/.cursor/skills/darin/SKILL.md

      - name: Publish to npm
        working-directory: packages/cli
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: darin v${{ steps.meta.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if git diff --staged --quiet; then
            echo "No CHANGELOG changes"
            exit 0
          fi
          git commit -m "docs: update CHANGELOG for ${{ github.ref_name }}"
          git push origin main
